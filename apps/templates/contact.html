<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">
  <main class="flex-1 max-w-3xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Contact</h1>
    <p class="mb-4 text-slate-300">
      We’d love to hear from you. For support, partnership inquiries, or general questions, you can reach us at:
    </p>
    <ul class="space-y-2 text-slate-300">
      <li>Email: <a href="mailto:info@driftless.pro" class="text-green-400 hover:underline">info@driftless.pro</a></li>
      <li>WhatsApp: <a href="https://wa.me/972546610653" class="text-green-400 hover:underline">+972 54-661-0653</a></li>
      <li>Business Address: <span class="text-slate-400">Echo Ltd, Sde Nehemia, Israel</span></li>
    </ul>

    <p class="mt-6 text-sm">
      <a href="{{ url_for('home') }}" class="text-green-400 hover:underline">← Back to Home</a>

  <footer class="border-t border-slate-700 py-6 text-center text-xs text-slate-400">
    © <span id="year"></span> Echo. All rights reserved.
    <div class="mt-3 flex justify-center gap-6">
      <a href="{{ url_for('privacy') }}" class="hover:text-slate-200">Privacy</a>

    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear()
  </script>
</body>
</html>
