[pytest]
pythonpath = .
testpaths = assistant/evals
asyncio_mode = auto
markers =
    integration: marks tests that require external services (Firebase, GreenAPI, etc.)
# Unit tests (default):  pytest
# Integration tests:     pytest tests/ -v  (requires .secrets/ + INTEGRATION_TEST_USER_ID)
filterwarnings =
    ignore::DeprecationWarning:langgraph
    ignore::UserWarning:pydantic